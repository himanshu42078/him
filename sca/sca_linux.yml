policy:
  id: "sca_wazuh_linux"
  file: "sca_linux.yml"
  name: "SCA Wazuh Linux combined check"
  description: "Combined Linux SCA policy: verifies the Wazuh agent configuration, the SSH daemon (no password auth), the Verve InfoSec password policy (min 12 chars + 3-of-4 character classes), and that Ubuntu/Debian APT auto-updates are deactivated."

requirements:
  title: "Check that the system is Linux"
  description: "This policy applies to Linux systems running the Wazuh agent."
  condition: any
  rules:
    - 'f:/etc/os-release'

variables:
  $ossec_files: /var/ossec/etc/ossec.conf
  $internal_files: /var/ossec/etc/local_internal_options.conf
  $sshd_config: /etc/ssh/sshd_config
  $sshd_config_d: /etc/ssh/sshd_config.d
  $pwquality: /etc/security/pwquality.conf
  $pwquality_d: /etc/security/pwquality.conf.d
  $login_defs: /etc/login.defs
  $apt_periodic: /etc/apt/apt.conf.d/20auto-upgrades
  $apt_conf_d: /etc/apt/apt.conf.d

checks:
  # -------------------------------------------------------------------------
  # Wazuh agent configuration
  # -------------------------------------------------------------------------
  - id: 100000
    title: "Wazuh Agent wazuh_command.remote_commands are enabled"
    condition: all
    rules:
      - 'f:$internal_files -> r:^wazuh_command.remote_commands=1$'

  - id: 100001
    title: "Wazuh Agent logcollector.remote_commands are enabled"
    condition: all
    rules:
      - 'f:$internal_files -> r:^logcollector.remote_commands=1$'

  - id: 100002
    title: "Wazuh Agent sca.remote_commands are enabled"
    condition: all
    rules:
      - 'f:$internal_files -> r:^sca.remote_commands=1$'

  # -------------------------------------------------------------------------
  # SSH daemon (only meaningful when /etc/ssh/sshd_config is present)
  # -------------------------------------------------------------------------
  - id: 100010
    title: "SSHD: Password authentication is disabled (effective config via sshd -T)"
    description: "PasswordAuthentication must be set to 'no' so that users cannot log in via SSH using a password. Only key-based authentication is permitted."
    rationale: "Allowing password authentication exposes the SSH service to brute-force and credential stuffing attacks. Disabling it enforces key-based authentication, which is significantly harder to compromise."
    remediation: "Set 'PasswordAuthentication no' in /etc/ssh/sshd_config (or in a drop-in file under /etc/ssh/sshd_config.d/), then reload sshd: 'systemctl reload sshd'. Verify the effective setting with 'sshd -T | grep -i passwordauthentication'."
    condition: all
    rules:
      - 'c:sshd -T -> r:^\s*passwordauthentication\s+no\s*$'

  - id: 100011
    title: "SSHD: Password authentication is disabled (file-based fallback)"
    description: "File-based check that does not require sca.remote_commands. Verifies that PasswordAuthentication is explicitly set to 'no' in /etc/ssh/sshd_config and that no drop-in file under /etc/ssh/sshd_config.d/ re-enables it."
    rationale: "On hosts where remote command execution for SCA is disabled, the effective-config check (sshd -T) cannot run. This fallback inspects the configuration files directly. Note: it cannot fully resolve Match blocks or Include semantics, so the sshd -T check should be preferred when available."
    remediation: "Set 'PasswordAuthentication no' in /etc/ssh/sshd_config and ensure no file under /etc/ssh/sshd_config.d/ sets 'PasswordAuthentication yes'. Reload sshd with 'systemctl reload sshd'."
    condition: all
    rules:
      - 'f:$sshd_config -> r:^\s*PasswordAuthentication\s+no\s*$'
      - 'not f:$sshd_config -> r:^\s*PasswordAuthentication\s+yes'
      - 'not d:$sshd_config_d -> .conf -> r:^\s*PasswordAuthentication\s+yes'

  # -------------------------------------------------------------------------
  # Ubuntu / Debian APT auto-update deactivation
  # -------------------------------------------------------------------------
  - id: 100020
    title: "Ubuntu: APT periodic package list updates are disabled"
    description: "APT::Periodic::Update-Package-Lists must be set to \"0\" so that apt does not automatically refresh the package lists."
    rationale: "Automatic apt operations can introduce unreviewed changes, trigger network activity outside of maintenance windows, and interfere with controlled patching processes managed by InfoSec / Ops."
    remediation: "Edit /etc/apt/apt.conf.d/20auto-upgrades and set 'APT::Periodic::Update-Package-Lists \"0\";'. If the file does not exist, create it. Alternatively run 'dpkg-reconfigure --priority=low unattended-upgrades' and select 'No'."
    condition: all
    rules:
      - 'f:$apt_periodic -> r:^\s*APT::Periodic::Update-Package-Lists\s+"0"\s*;'
      - 'not d:$apt_conf_d -> .* -> r:^\s*APT::Periodic::Update-Package-Lists\s+"[^0]"\s*;'

  - id: 100021
    title: "Ubuntu: APT unattended-upgrades are disabled"
    description: "APT::Periodic::Unattended-Upgrade must be set to \"0\" so that apt does not automatically install upgrades in the background."
    rationale: "Unattended upgrades can install package versions that have not been tested in the environment, may require service restarts, and bypass change management."
    remediation: "Edit /etc/apt/apt.conf.d/20auto-upgrades and set 'APT::Periodic::Unattended-Upgrade \"0\";'. Optionally also 'systemctl mask --now apt-daily.timer apt-daily-upgrade.timer' to fully stop the daily APT timers."
    condition: all
    rules:
      - 'f:$apt_periodic -> r:^\s*APT::Periodic::Unattended-Upgrade\s+"0"\s*;'
      - 'not d:$apt_conf_d -> .* -> r:^\s*APT::Periodic::Unattended-Upgrade\s+"[^0]"\s*;'

  - id: 100022
    title: "Ubuntu: APT does not auto-download upgradeable packages"
    description: "APT::Periodic::Download-Upgradeable-Packages should be set to \"0\" so that apt does not silently pre-fetch upgrade candidates."
    rationale: "Pre-downloading upgrades produces unexpected network traffic and stages packages that may then be installed unattended."
    remediation: "Edit /etc/apt/apt.conf.d/20auto-upgrades and set 'APT::Periodic::Download-Upgradeable-Packages \"0\";'."
    condition: all
    rules:
      - 'not d:$apt_conf_d -> .* -> r:^\s*APT::Periodic::Download-Upgradeable-Packages\s+"[^0]"\s*;'

  - id: 100023
    title: "Ubuntu: apt-daily systemd timers are masked or disabled (effective state)"
    description: "The systemd timers apt-daily.timer and apt-daily-upgrade.timer must not be active, so that no automatic APT operation can be triggered even if config files are changed."
    rationale: "Even with APT::Periodic options set to 0, the timers remain active and will run again as soon as the config is reset. Masking the timers provides defense in depth."
    remediation: "Run: 'systemctl mask --now apt-daily.timer apt-daily-upgrade.timer'. Verify with 'systemctl is-enabled apt-daily.timer' — it should return 'masked' or 'disabled'."
    condition: all
    rules:
      - 'c:systemctl is-enabled apt-daily.timer -> r:^(masked|disabled)$'
      - 'c:systemctl is-enabled apt-daily-upgrade.timer -> r:^(masked|disabled)$'

  # -------------------------------------------------------------------------
  # Password policy (Verve Policy on Acceptable Use v2.2, section 2.2)
  # -------------------------------------------------------------------------
  - id: 100030
    title: "Linux: Password minimum length is at least 12 (pwquality)"
    description: "pam_pwquality must enforce a minimum password length of 12 characters per Verve Policy on Acceptable Use v2.2 section 2.2."
    rationale: "Shorter passwords are dramatically easier to brute force. Enforcing a minimum length at the PAM layer guarantees that every password set via passwd / chpasswd / useradd meets the policy."
    remediation: "Set 'minlen = 12' in /etc/security/pwquality.conf (or a drop-in under /etc/security/pwquality.conf.d/). Confirm with 'grep -E ^minlen /etc/security/pwquality.conf'."
    condition: all
    rules:
      - 'f:$pwquality -> n:^\s*minlen\s*=\s*(\d+) compare >= 12'
      - 'not d:$pwquality_d -> .conf -> n:^\s*minlen\s*=\s*(\d+) compare < 12'

  - id: 100031
    title: "Linux: Password requires at least 3 of 4 character classes (pwquality)"
    description: "pam_pwquality must require at least three different character classes (upper, lower, digit, special) per Verve Policy on Acceptable Use v2.2 section 2.2."
    rationale: "Complexity requirements raise the cost of brute-force and dictionary attacks by enlarging the keyspace each password is drawn from."
    remediation: "Set 'minclass = 3' in /etc/security/pwquality.conf. Confirm with 'grep -E ^minclass /etc/security/pwquality.conf'."
    condition: all
    rules:
      - 'f:$pwquality -> n:^\s*minclass\s*=\s*(\d+) compare >= 3'
      - 'not d:$pwquality_d -> .conf -> n:^\s*minclass\s*=\s*(\d+) compare < 3'

  - id: 100032
    title: "Linux: pam_pwquality (or pam_cracklib) is enabled in the password stack"
    description: "The password-changing PAM stack must invoke pam_pwquality (or legacy pam_cracklib) so that the pwquality.conf settings are actually enforced. Configuration values without an active PAM module have no effect."
    rationale: "Without pam_pwquality in the PAM stack, /etc/security/pwquality.conf is dead config — passwd will accept any password regardless of minlen / minclass."
    remediation: "Ensure /etc/pam.d/common-password (Debian/Ubuntu) or /etc/pam.d/system-auth and /etc/pam.d/password-auth (RHEL/SUSE) include a line such as 'password requisite pam_pwquality.so retry=3'. On RHEL: 'authselect select sssd with-pwquality'. On Debian/Ubuntu: 'apt install libpam-pwquality'."
    condition: any
    rules:
      - 'f:/etc/pam.d/common-password -> r:^\s*password\s+\S+\s+pam_pwquality\.so'
      - 'f:/etc/pam.d/system-auth -> r:^\s*password\s+\S+\s+pam_pwquality\.so'
      - 'f:/etc/pam.d/password-auth -> r:^\s*password\s+\S+\s+pam_pwquality\.so'
      - 'f:/etc/pam.d/common-password -> r:^\s*password\s+\S+\s+pam_cracklib\.so'

  - id: 100033
    title: "Linux: login.defs PASS_MIN_LEN is at least 12"
    description: "As a defense-in-depth backstop for utilities that do not go through PAM (e.g. some chpasswd / useradd paths), PASS_MIN_LEN in /etc/login.defs must be at least 12."
    rationale: "PAM with pwquality is the primary enforcement point, but login.defs is honored by shadow-utils for tools that bypass PAM. Keeping both aligned prevents accidental weak passwords."
    remediation: "Edit /etc/login.defs and set 'PASS_MIN_LEN   12' (whitespace, not '=')."
    condition: all
    rules:
      - 'f:$login_defs -> n:^\s*PASS_MIN_LEN\s+(\d+) compare >= 12'
